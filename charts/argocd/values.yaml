argo-cd:
  crds:
    install: true

  global:
    domain: argo.donethanks.com

  configs:
    cm:
      url: https://argo.donethanks.com
      
      # Keycloak OIDC configuration
      oidc.config: |
        name: Keycloak
        issuer: http://keycloak.donethanks.com:8080/realms/master
        clientID: argocd
        clientSecret: $oidc.keycloak.clientSecret
        requestedScopes:
          - openid
          - profile
          - email
          - groups
        requestedIDTokenClaims:
          groups:
            essential: true
    
    # OIDC client secret (will be created as a secret)
    secret:
      extra:
        oidc.keycloak.clientSecret: "argocd-keycloak-client-secret-change-me"
    
    # RBAC policy - map Keycloak groups to Argo CD roles
    rbac:
      policy.csv: |
        # Default role for authenticated users
        g, argocd-users, role:readonly
        
        # Admin role for admin realm role
        g, admin, role:admin
      
      policy.default: role:readonly
    
    params:
      server.insecure: true

  dex:
    enabled: false

  notifications:
    enabled: false

  server:
    # Default pattern for this environment:
    # Caddy terminates TLS for https://argo.donethanks.com and proxies
    # to this fixed NodePort on the k3s server.
    
    # Add hostAliases to resolve keycloak.donethanks.com to internal service
    hostAliases:
      - ip: "10.43.41.215"
        hostnames:
          - "keycloak.donethanks.com"
    
    service:
      type: NodePort
      nodePortHttp: 30080
      nodePortHttps: 30443

    ingress:
      enabled: false
      ingressClassName: traefik
      hostname: argo.donethanks.com
      path: /
      pathType: Prefix
      tls: false

    # Optional permanent port mapping alternative:
    # service:
    #   type: NodePort
    #   nodePortHttp: 30080
    #   nodePortHttps: 30443
    # ingress:
    #   enabled: false

  controller:
    metrics:
      enabled: true

  repoServer:
    metrics:
      enabled: true

  applicationSet:
    metrics:
      enabled: true
