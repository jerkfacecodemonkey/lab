argo-cd:
  crds:
    install: true

  global:
    domain: argo.donethanks.com
    # Resolve Keycloak hostname to Traefik's cluster service so HTTPS/443 works.
    # Keycloak's backend service only exposes 8080 and cannot serve TLS directly.
    hostAliases:
      - ip: "10.43.78.203"
        hostnames:
          - "keycloak.donethanks.com"

  configs:
    cm:
      url: https://argo.donethanks.com

      # Local service accounts (bypass SSO/Keycloak)
      accounts.orc-api: apiKey

      # Keycloak OIDC configuration
      oidc.config: |
        name: Keycloak
        issuer: https://keycloak.donethanks.com/realms/master
        clientID: argocd
        clientSecret: $oidc.keycloak.clientSecret
        insecureEnableGroups: true
        insecureSkipVerify: true
        requestedScopes:
          - openid
        requestedIDTokenClaims:
          groups:
            essential: true
    
    # OIDC client secret (will be created as a secret)
    secret:
      extra:
        oidc.keycloak.clientSecret: "argocd-keycloak-client-secret-change-me"
    
    # RBAC policy - map Keycloak groups to Argo CD roles
    rbac:
      policy.csv: |
        # Default role for authenticated users
        g, argocd-users, role:readonly

        # Admin role for admin realm role
        g, admin, role:admin

        # orc-api service account — scoped to the orc application only
        p, role:orc-api, applications, get, orc/orc, allow
        p, role:orc-api, applications, update, orc/orc, allow
        p, role:orc-api, applications, sync, orc/orc, allow
        g, orc-api, role:orc-api

      policy.default: role:readonly
    
    params:
      server.insecure: true

  dex:
    enabled: false

  notifications:
    enabled: false

  server:
    # Default pattern for this environment:
    # Caddy terminates TLS for https://argo.donethanks.com and proxies
    # to this fixed NodePort on the k3s server.
    
    service:
      type: NodePort
      nodePortHttp: 30080
      nodePortHttps: 30443

    ingress:
      enabled: false
      ingressClassName: traefik
      hostname: argo.donethanks.com
      path: /
      pathType: Prefix
      tls: false

    # Optional permanent port mapping alternative:
    # service:
    #   type: NodePort
    #   nodePortHttp: 30080
    #   nodePortHttps: 30443
    # ingress:
    #   enabled: false

  controller:
    metrics:
      enabled: true

  repoServer:
    metrics:
      enabled: true

  applicationSet:
    metrics:
      enabled: true
