operator:
  image:
    repository: quay.io/keycloak/keycloak-operator
    tag: "26.0.7"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

keycloak:
  enabled: true
  replicas: 1
  image: quay.io/keycloak/keycloak:26.0.7
  startOptimized: false
  proxyHeaders: xforwarded
  
  # Start mode - use 'start-dev' for H2 database (no external DB needed)
  # or 'start' for production with external database
  # Note: Operator always uses production mode, so we provide postgres
  startMode: start
  
  # Admin credentials secret
  adminSecret:
    create: true
    name: keycloak-initial-admin
    username: admin
    # password will be generated if not set
    password: "change-me-admin"
  
  # Hostname for Keycloak
  hostname: keycloak.donethanks.com
  
  # Keycloak features to enable
  features:
    enabled:
      - passkeys
    disabled: []
  
  # Realm import configuration
  realmImport:
    enabled: true
  
  # OIDC Clients configuration
  clients:
    argocd:
      secret: "argocd-keycloak-client-secret-change-me"
    adguardOauth:
      secret: "adguard-oauth-client-secret-change-me"
    traefikOauth:
      secret: "traefik-oauth-client-secret-change-me"
  
  # Additional Keycloak options
  additionalOptions: []
    # - name: features
    #   value: "token-exchange,admin-fine-grained-authz"
# PostgreSQL Database
postgres:
  enabled: true
  image: postgres:16-alpine
  database: keycloak
  username: keycloak
  password: changeme-keycloak-postgres  # Change this!
  storage: 2Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
ingress:
  enabled: true
  host: keycloak.donethanks.com
