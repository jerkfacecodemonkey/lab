{{- if .Values.keycloak.enabled }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.keycloak.replicas }}
  
  image: {{ .Values.keycloak.image }}
  
  bootstrapAdmin:
    user:
      secret: {{ .Values.keycloak.adminSecret.name }}
  
  http:
    httpEnabled: true
    tlsSecret: ""
  
  hostname:
    hostname: {{ .Values.keycloak.hostname }}
    strict: false
    strictBackchannel: false
  
  {{- if eq .Values.keycloak.startMode "start-dev" }}
  unsupported:
    podTemplate:
      spec:
        containers:
          - name: keycloak
            args:
              - start-dev
            env:
              - name: KC_HEALTH_ENABLED
                value: "true"
              - name: KC_METRICS_ENABLED
                value: "true"
            resources:
              {{- toYaml .Values.keycloak.resources | nindent 14 }}
  {{- else }}
  # For production mode, configure external database here
  db:
    vendor: postgres
    host: "{{ .Values.keycloak.db.host }}"
    database: "{{ .Values.keycloak.db.database }}"
    usernameSecret:
      name: "{{ .Values.keycloak.db.usernameSecret.name }}"
      key: "{{ .Values.keycloak.db.usernameSecret.key }}"
    passwordSecret:
      name: "{{ .Values.keycloak.db.passwordSecret.name }}"
      key: "{{ .Values.keycloak.db.passwordSecret.key }}"
  
  unsupported:
    podTemplate:
      spec:
        containers:
          - name: keycloak
            args:
              - start
              - --optimized
            resources:
              {{- toYaml .Values.keycloak.resources | nindent 14 }}
  {{- end }}
  
  {{- with .Values.keycloak.additionalOptions }}
  additionalOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
