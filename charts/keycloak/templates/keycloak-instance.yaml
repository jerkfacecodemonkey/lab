{{- if .Values.keycloak.enabled }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.keycloak.replicas }}
  startOptimized: {{ .Values.keycloak.startOptimized }}
  
  image: {{ .Values.keycloak.image }}
  
  bootstrapAdmin:
    user:
      secret: {{ .Values.keycloak.adminSecret.name }}
  
  http:
    httpEnabled: true
    tlsSecret: ""
  
  hostname:
    hostname: {{ .Values.keycloak.hostname }}
    strict: false

  proxy:
    headers: {{ .Values.keycloak.proxyHeaders }}
  
  {{- if .Values.keycloak.features }}
  features:
    {{- if .Values.keycloak.features.enabled }}
    enabled:
      {{- toYaml .Values.keycloak.features.enabled | nindent 6 }}
    {{- end }}
    {{- if .Values.keycloak.features.disabled }}
    disabled:
      {{- toYaml .Values.keycloak.features.disabled | nindent 6 }}
    {{- end }}
  {{- end }}
  
  {{- if eq .Values.keycloak.startMode "start-dev" }}
  # Dev mode - no DB config needed
  {{- else }}
  # Production mode with PostgreSQL
  db:
    vendor: postgres
    host: postgres.{{ .Release.Namespace }}.svc.cluster.local
    database: {{ .Values.postgres.database }}
    usernameSecret:
      name: postgres-secrets
      key: POSTGRES_USER
    passwordSecret:
      name: postgres-secrets
      key: POSTGRES_PASSWORD
  {{- end }}
  
{{- end }}
