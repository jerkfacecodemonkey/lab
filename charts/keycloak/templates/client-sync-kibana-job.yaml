{{- if and .Values.keycloak.enabled .Values.keycloak.clientSync.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-client-sync-kibana
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "30"
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "keycloak.labels" . | nindent 8 }}
        app.kubernetes.io/component: client-sync
    spec:
      restartPolicy: Never
      containers:
        - name: sync-kibana-client
          image: {{ .Values.keycloak.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSync.adminSecretName }}
                  key: {{ .Values.keycloak.clientSync.adminUsernameKey }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSync.adminSecretName }}
                  key: {{ .Values.keycloak.clientSync.adminPasswordKey }}
          command:
            - /bin/bash
            - -ec
            - |
              SERVER_URL="http://keycloak-service.{{ .Release.Namespace }}.svc.cluster.local:8080"
              REALM="{{ .Values.keycloak.clientSync.realm }}"
              CLIENT_ID="kibana-oauth"
              CLIENT_NAME="Kibana OAuth Proxy"
              REDIRECT_URI="https://kibana.donethanks.com/oauth2/callback"
              WEB_ORIGIN="https://kibana.donethanks.com"
              CLIENT_SECRET="{{ .Values.keycloak.clients.kibanaOauth.secret }}"

              /opt/keycloak/bin/kcadm.sh config credentials \
                --server "${SERVER_URL}" \
                --realm master \
                --user "${KEYCLOAK_ADMIN_USER}" \
                --password "${KEYCLOAK_ADMIN_PASSWORD}"

              EXISTING_JSON="$(/opt/keycloak/bin/kcadm.sh get clients -r "${REALM}" -q clientId="${CLIENT_ID}" --fields id,clientId)"
              EXISTING_ID="$(echo "${EXISTING_JSON}" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"

              if [[ -z "${EXISTING_ID}" ]]; then
                echo "Creating client ${CLIENT_ID}"
                EXISTING_ID="$(/opt/keycloak/bin/kcadm.sh create clients -r "${REALM}" -i \
                  -s clientId="${CLIENT_ID}" \
                  -s name="${CLIENT_NAME}" \
                  -s description="OAuth2 Proxy in front of Kibana" \
                  -s enabled=true \
                  -s protocol=openid-connect \
                  -s publicClient=false \
                  -s clientAuthenticatorType=client-secret \
                  -s standardFlowEnabled=true \
                  -s implicitFlowEnabled=false \
                  -s directAccessGrantsEnabled=false \
                  -s serviceAccountsEnabled=false \
                  -s 'defaultClientScopes=["profile","email","roles"]' \
                  -s 'optionalClientScopes=["groups"]' \
                  -s "redirectUris=[\"${REDIRECT_URI}\"]" \
                  -s "webOrigins=[\"${WEB_ORIGIN}\"]")"
              else
                echo "Updating client ${CLIENT_ID} (${EXISTING_ID})"
                /opt/keycloak/bin/kcadm.sh update "clients/${EXISTING_ID}" -r "${REALM}" \
                  -s name="${CLIENT_NAME}" \
                  -s description="OAuth2 Proxy in front of Kibana" \
                  -s enabled=true \
                  -s protocol=openid-connect \
                  -s publicClient=false \
                  -s clientAuthenticatorType=client-secret \
                  -s standardFlowEnabled=true \
                  -s implicitFlowEnabled=false \
                  -s directAccessGrantsEnabled=false \
                  -s serviceAccountsEnabled=false \
                  -s 'defaultClientScopes=["profile","email","roles"]' \
                  -s 'optionalClientScopes=["groups"]' \
                  -s "redirectUris=[\"${REDIRECT_URI}\"]" \
                  -s "webOrigins=[\"${WEB_ORIGIN}\"]"
              fi

              /opt/keycloak/bin/kcadm.sh create "clients/${EXISTING_ID}/client-secret" -r "${REALM}" -s "value=${CLIENT_SECRET}"
              echo "Client ${CLIENT_ID} is reconciled."
{{- end }}
