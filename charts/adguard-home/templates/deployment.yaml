apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adguard-home.fullname" . }}
  labels:
    {{- include "adguard-home.labels" . | nindent 4 }}
spec:
  strategy:
    type: {{ if or .Values.dns.hostPort.enabled .Values.dns.hostNetwork.enabled }}Recreate{{ else }}RollingUpdate{{ end }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "adguard-home.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "adguard-home.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.dns.hostNetwork.enabled }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if .Values.splitDns.enabled }}
      initContainers:
        - name: apply-split-dns
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              conf="/opt/adguardhome/conf/AdGuardHome.yaml"
              tmp="${conf}.tmp"

              if [ ! -f "$conf" ]; then
                echo "AdGuard config not found at $conf" >&2
                exit 1
              fi

              # YAML treats unquoted '*' values as aliases. Normalize wildcard
              # rewrite domains to quoted strings before any further edits.
              sed -i -E 's#^([[:space:]]*- domain: )\*([^\"]+)$#\1"*\2"#' "$conf"

              awk '
                BEGIN { in_rules=0; inserted=0 }
                /^user_rules:/ {
                  print "user_rules:"
{{- range .Values.splitDns.domains }}
                  print "  - \"||{{ . }}^$dnsrewrite=NOERROR;A;{{ $.Values.splitDns.answer }}\""
{{- end }}
                  in_rules=1
                  inserted=1
                  next
                }
                in_rules && /^[a-z_]+:/ {
                  in_rules=0
                }
                !in_rules {
                  print
                }
                END {
                  if (!inserted) {
                    print "user_rules:"
{{- range .Values.splitDns.domains }}
                    print "  - \"||{{ . }}^$dnsrewrite=NOERROR;A;{{ $.Values.splitDns.answer }}\""
{{- end }}
                  }
                }
              ' "$conf" > "$tmp"

              mv "$tmp" "$conf"
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
      {{- end }}
      containers:
        - name: adguard-home
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: dns-tcp
              containerPort: {{ .Values.dns.port }}
              protocol: TCP
              {{- if and .Values.dns.hostPort.enabled (not .Values.dns.hostNetwork.enabled) }}
              hostPort: {{ .Values.dns.hostPort.port }}
              {{- end }}
            - name: dns-udp
              containerPort: {{ .Values.dns.port }}
              protocol: UDP
              {{- if and .Values.dns.hostPort.enabled (not .Values.dns.hostNetwork.enabled) }}
              hostPort: {{ .Values.dns.hostPort.port }}
              {{- end }}
            - name: web
              containerPort: {{ .Values.service.webPort }}
              protocol: TCP
            - name: setup
              containerPort: {{ .Values.service.setupPort }}
              protocol: TCP
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: conf
              mountPath: /opt/adguardhome/conf
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: work
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "adguard-home.fullname" . }}-work
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: conf
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "adguard-home.fullname" . }}-conf
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
