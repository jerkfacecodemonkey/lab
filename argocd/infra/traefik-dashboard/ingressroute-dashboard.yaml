apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - web
    - websecure
  tls: {}
  routes:
    - kind: Rule
      match: Host(`traefik.donethanks.com`) && Path(`/`)
      middlewares:
        - name: traefik-dashboard-root-redirect
          namespace: kube-system
      services:
        - kind: TraefikService
          name: api@internal
    - kind: Rule
      match: Host(`traefik.donethanks.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      services:
        - kind: TraefikService
          name: api@internal
