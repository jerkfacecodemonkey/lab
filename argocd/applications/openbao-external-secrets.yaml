apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao-external-secrets
  namespace: argocd
spec:
  project: core
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: argocd/infra/openbao-external-secrets
    directory:
      recurse: false
      exclude: openbao-eso-token-secret.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
