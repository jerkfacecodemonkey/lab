apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: argocd/infra/cert-manager
    directory:
      recurse: false
      exclude: cloudflare-api-token-secret.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
