apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: charts/adguard-home
    helm:
      parameters:
        - name: service.nodePorts.web
          value: "30081"
  destination:
    server: https://kubernetes.default.svc
    namespace: adguard-home
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
