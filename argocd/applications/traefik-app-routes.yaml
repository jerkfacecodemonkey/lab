apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-app-routes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: argocd/infra/traefik-app-routes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
