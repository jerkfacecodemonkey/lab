apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-kafka
  namespace: argocd
  labels:
    homelab.donethanks.com/project: pipeline
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: pipeline
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: projects/pipeline/charts/kafka
    helm:
      releaseName: strimzi-kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
