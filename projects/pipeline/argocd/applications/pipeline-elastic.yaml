apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-elastic
  namespace: argocd
  labels:
    homelab.donethanks.com/project: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: pipeline
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: projects/pipeline/charts/elastic
    helm:
      releaseName: elastic
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
