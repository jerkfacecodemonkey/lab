apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "elastic.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
spec:
  type: {{ .Values.elasticsearch.service.type }}
  ports:
    - name: http
      port: {{ .Values.elasticsearch.service.port }}
      targetPort: http
      protocol: TCP
      {{- if eq .Values.elasticsearch.service.type "NodePort" }}
      nodePort: {{ .Values.elasticsearch.service.nodePort }}
      {{- end }}
    - name: transport
      port: {{ .Values.elasticsearch.service.transportPort }}
      targetPort: transport
      protocol: TCP
  selector:
    app.kubernetes.io/component: elasticsearch
    app.kubernetes.io/instance: {{ .Release.Name }}
