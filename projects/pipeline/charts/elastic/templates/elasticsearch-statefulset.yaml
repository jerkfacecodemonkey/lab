apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    {{- include "elastic.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
spec:
  serviceName: elasticsearch
  replicas: {{ .Values.elasticsearch.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: elasticsearch
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "elastic.labels" . | nindent 8 }}
        app.kubernetes.io/component: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: "{{ .Values.elasticsearch.image.repository }}:{{ .Values.elasticsearch.image.tag }}"
          imagePullPolicy: {{ .Values.elasticsearch.image.pullPolicy }}
          {{- if .Values.security.oidc.enabled }}
          command:
            - /bin/bash
            - -ec
            - |
              if ! bin/elasticsearch-keystore list >/dev/null 2>&1; then
                bin/elasticsearch-keystore create
              fi
              printf '%s' "${OIDC_CLIENT_SECRET}" | bin/elasticsearch-keystore add -xf xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.rp.client_secret
              exec /usr/local/bin/docker-entrypoint.sh
          {{- end }}
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: {{ ternary "true" "false" .Values.security.enabled | quote }}
            {{- if .Values.security.oidc.enabled }}
            - name: xpack.security.authc.token.enabled
              value: "true"
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.order
              value: "2"
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.rp.client_id
              value: {{ .Values.security.oidc.clientId | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.rp.response_type
              value: code
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.rp.redirect_uri
              value: https://{{ .Values.security.oidc.kibana.host }}/api/security/oidc/callback
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.rp.post_logout_redirect_uri
              value: https://{{ .Values.security.oidc.kibana.host }}{{ .Values.security.oidc.kibana.postLogoutPath }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.issuer
              value: {{ .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.authorization_endpoint
              value: {{ printf "%s/protocol/openid-connect/auth" .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.token_endpoint
              value: {{ printf "%s/protocol/openid-connect/token" .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.userinfo_endpoint
              value: {{ printf "%s/protocol/openid-connect/userinfo" .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.endsession_endpoint
              value: {{ printf "%s/protocol/openid-connect/logout" .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.op.jwkset_path
              value: {{ printf "%s/protocol/openid-connect/certs" .Values.security.oidc.issuer | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.claims.principal
              value: {{ .Values.security.oidc.claims.principal | quote }}
            - name: xpack.security.authc.realms.oidc.{{ .Values.security.oidc.realm }}.claims.groups
              value: {{ .Values.security.oidc.claims.groups | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "elastic.securitySecretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- if .Values.security.enabled }}
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "elastic.securitySecretName" . }}
                  key: elastic-password
            {{- end }}
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
            - name: cluster.name
              value: "elastic-local"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.elasticsearch.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
  {{- if .Values.elasticsearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.elasticsearch.persistence.size }}
        {{- if .Values.elasticsearch.persistence.storageClass }}
        storageClassName: {{ .Values.elasticsearch.persistence.storageClass | quote }}
        {{- end }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
