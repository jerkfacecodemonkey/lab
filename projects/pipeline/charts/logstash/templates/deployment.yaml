apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logstash.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "logstash.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.logstash.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "logstash.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "logstash.labels" . | nindent 8 }}
    spec:
      containers:
        - name: logstash
          image: "{{ .Values.logstash.image.repository }}:{{ .Values.logstash.image.tag }}"
          imagePullPolicy: {{ .Values.logstash.image.pullPolicy }}
          env:
            - name: KAFKA_SSL_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logstash.kafkaTls.clientSecretName }}
                  key: {{ .Values.logstash.kafkaTls.clientKeystorePasswordKey }}
            - name: KAFKA_SSL_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logstash.kafkaTls.trustSecretName }}
                  key: {{ .Values.logstash.kafkaTls.truststorePasswordKey }}
            {{- if .Values.logstash.elasticsearch.passwordSecretName }}
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logstash.elasticsearch.passwordSecretName }}
                  key: {{ .Values.logstash.elasticsearch.passwordSecretKey }}
            {{- end }}
          ports:
            - name: api
              containerPort: 9600
          resources:
            {{- toYaml .Values.logstash.resources | nindent 12 }}
          volumeMounts:
            - name: logstash-settings
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
              readOnly: true
            - name: logstash-pipeline-dir
              mountPath: /usr/share/logstash/pipeline
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline/pipeline.conf
              subPath: pipeline.conf
              readOnly: true
            - name: kafka-tls
              mountPath: /etc/logstash/certs
              readOnly: true
      volumes:
        - name: logstash-settings
          configMap:
            name: {{ include "logstash.fullname" . }}-settings
        - name: logstash-pipeline
          configMap:
            name: {{ include "logstash.fullname" . }}-pipeline
        - name: logstash-pipeline-dir
          emptyDir: {}
        - name: kafka-tls
          projected:
            sources:
              - secret:
                  name: {{ .Values.logstash.kafkaTls.clientSecretName }}
              - secret:
                  name: {{ .Values.logstash.kafkaTls.trustSecretName }}
