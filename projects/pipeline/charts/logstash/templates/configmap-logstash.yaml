apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "logstash.fullname" . }}-settings
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "logstash.labels" . | nindent 4 }}
data:
  logstash.yml: |
    api.http.host: 0.0.0.0
    queue.type: persisted
    pipeline.ordered: auto
    pipeline.workers: 1
    log.level: info
