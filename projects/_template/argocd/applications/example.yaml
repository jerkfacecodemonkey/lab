apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: REPLACE_PROJECT_NAME-example
  namespace: argocd
  labels:
    homelab.donethanks.com/project: REPLACE_PROJECT_NAME
spec:
  project: REPLACE_PROJECT_NAME
  source:
    repoURL: git@github.com:jerkfacecodemonkey/lab.git
    targetRevision: HEAD
    path: projects/REPLACE_PROJECT_NAME/charts/example
    helm:
      releaseName: example
  destination:
    server: https://kubernetes.default.svc
    namespace: REPLACE_NAMESPACE
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
